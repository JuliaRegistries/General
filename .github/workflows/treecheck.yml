name: Treecheck

on:
  pull_request:
    paths:
      - '**/Package.toml'

env:
    JULIA_PKG_USE_CLI_GIT: true

permissions:
  contents: read

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only pull request builds
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  generate-matrix-treecheck:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          #
          # Number of commits to fetch. 0 indicates all history for all branches and tags.
          # Default: 1
          fetch-depth: '2'
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2.7.0
        with:
          version: '1.11'
      - name: Cache artifacts and packages
        uses: julia-actions/cache@9a93c5fb3e9c1c20b60fc80a478cae53e38618a4 # v3.0.2
      - uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 #v47.0.5
        id: changed-files
      - run: |
          import Pkg
          Pkg.instantiate()
        shell: julia --startup-file=no --color=yes --project=.ci/Treecheck {0}
        env:
          JULIA_LOAD_PATH: '@:@stdlib'
      - run: |
          include("$(ENV["GITHUB_WORKSPACE"])/.ci/Treecheck/Treecheck.jl")

          Treecheck.generate_ci_matrix()
        id: set-matrix
        shell: julia --startup-file=no --color=yes --project=.ci/Treecheck {0}
        env:
          JULIA_LOAD_PATH: '@'
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
  treecheck:
    runs-on: ubuntu-latest
    # Don't error on empty matrix:
    if: ${{ needs.generate-matrix-treecheck.outputs.matrix != '[]' && needs.generate-matrix-treecheck.outputs.matrix != '' }}
    needs:
      - generate-matrix-treecheck
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.generate-matrix-treecheck.outputs.matrix)}}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2.7.0
        with:
          version: '1.11'
      - name: Cache artifacts and packages
        uses: julia-actions/cache@9a93c5fb3e9c1c20b60fc80a478cae53e38618a4 # v3.0.2
      - run: |
          import Pkg
          Pkg.instantiate()
        shell: julia --startup-file=no --color=yes --project=.ci/Treecheck {0}
        env:
          JULIA_LOAD_PATH: '@:@stdlib'
      - run: |
          include("$(ENV["GITHUB_WORKSPACE"])/.ci/Treecheck/Treecheck.jl")

          uuid_str = strip(ENV["PACKAGE_UUID"])

          Treecheck.check(uuid_str)
        shell: julia --startup-file=no --color=yes --project=.ci/Treecheck {0}
        env:
          JULIA_LOAD_PATH: '@'
          PACKAGE_UUID: ${{ matrix.PACKAGE_UUID }}
